<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>全职高手小游戏之——你与谁最匹配？！？！</title>
  <style>
    :root {
      --bg-1: #0f1020;
      --bg-2: #1a1c38;
      --accent: #ffb703;
      --accent-hover: #ffc94a;
      --text-main: #f7f8ff;
      --text-sub: #c7cae7;
      --card: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.2);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
      color: var(--text-main);
      background: radial-gradient(circle at top right, #28326d 0%, transparent 40%),
        radial-gradient(circle at bottom left, #5f247a 0%, transparent 45%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .hero {
      width: min(900px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      backdrop-filter: blur(8px);
      border-radius: 24px;
      padding: 42px 28px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    .tag {
      display: inline-block;
      margin-bottom: 18px;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 14px;
      color: #1d1d1d;
      background: var(--accent);
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    h1 {
      font-size: clamp(30px, 5vw, 52px);
      line-height: 1.2;
      letter-spacing: 1px;
      margin-bottom: 16px;
      text-wrap: balance;
    }

    .title-main {
      display: block;
      font-size: clamp(26px, 3.8vw, 40px);
      font-weight: 700;
    }

    .title-highlight {
      display: block;
      margin-top: 6px;
      font-size: clamp(36px, 6.3vw, 64px);
      font-weight: 800;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      cursor: pointer;
      border-radius: 12px;
      padding: 14px 26px;
      font-size: 17px;
      font-weight: 700;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .btn-primary {
      background: var(--accent);
      color: #1f1f1f;
      box-shadow: 0 10px 24px rgba(255, 183, 3, 0.3);
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
    }

    .hidden {
      display: none;
    }

    .game-content {
      width: min(960px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      backdrop-filter: blur(8px);
      border-radius: 24px;
      padding: 32px 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    .opening {
      margin-bottom: 20px;
      padding: 14px 16px;
      border-left: 3px solid rgba(132, 232, 154, 0.9);
      border: 1px solid rgba(132, 232, 154, 0.45);
      background: rgba(132, 232, 154, 0.12);
      border-radius: 10px;
    }

    .dialogue {
      color: rgba(247, 248, 255, 0.82);
      line-height: 1.75;
      font-size: 15px;
    }

    .dialogue p + p {
      margin-top: 8px;
    }

    .question {
      margin-top: 4px;
      color: var(--text-main);
      font-size: clamp(24px, 4vw, 34px);
      font-weight: 800;
      line-height: 1.35;
    }

    .question-media {
      margin-top: 12px;
    }

    .question-media.side {
      margin-top: 0;
      flex: 0 0 auto;
    }

    .question-image {
      width: min(130px, 100%);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.06);
    }

    .options-row {
      display: block;
    }

    .options-row.side {
      margin-top: 16px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .options {
      margin-top: 16px;
      display: grid;
      gap: 12px;
    }

    .options-row.side .options {
      margin-top: 0;
      flex: 1;
    }

    .option-item {
      width: 100%;
      text-align: left;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 12px;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.06);
      font-size: 18px;
      line-height: 1.6;
      color: var(--text-main);
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .option-item:hover {
      background: rgba(255, 255, 255, 0.14);
      transform: translateY(-1px);
    }

    .option-id {
      color: var(--accent);
      font-weight: 700;
    }

    .shape-icon {
      width: 20px;
      height: 20px;
      margin-left: 4px;
      vertical-align: -3px;
      color: currentColor;
    }

    .result-card {
      border: 1px solid rgba(255, 183, 3, 0.45);
      border-radius: 14px;
      padding: 16px;
      background: rgba(255, 183, 3, 0.08);
      margin-bottom: 16px;
    }

    .result-name {
      font-size: clamp(26px, 4vw, 36px);
      font-weight: 800;
      margin-bottom: 10px;
      color: #ffd67a;
    }

    .result-body,
    .result-note {
      font-size: 17px;
      line-height: 1.8;
      color: rgba(247, 248, 255, 0.94);
      white-space: pre-wrap;
    }

    .result-note {
      margin-top: 10px;
      color: #ffe7b3;
    }

    .all-results {
      margin-top: 16px;
      display: grid;
      gap: 12px;
    }

    .all-results-divider {
      text-align: center;
      color: #ffe7b3;
      font-weight: 700;
      letter-spacing: 1px;
      margin: 4px 0 2px;
      font-size: clamp(24px, 3.8vw, 34px);
      line-height: 1.35;
    }

    @media (max-width: 520px) {
      .hero {
        padding: 34px 20px;
        border-radius: 18px;
      }

      .btn {
        width: 100%;
      }

      .options-row.side {
        flex-direction: column;
      }

      .question-image {
        width: 120px;
      }
    }
  </style>
</head>

    </section>
  </main>

      "21": { title: "地上有一只蟑螂。活的。", options: [

        { key: "B", text: "没有其他人在旁边的话，踩死。有人在身旁的话，让人踩死", next: "22" },
        { key: "C", text: "踩死", next: "29" },

        { key: "B", text: "关窗", next: "27" },

      ] },
      "26": { title: "刚买的笔记本被自己弄卷边了。", options: [

      "28": { title: "不如考虑一下成为女孩子，这样就有很多测试题可以做了。", options: [

    function setQuestionTitle(index, text) {
      questionText.textContent = `第${Number(index)}题：${text}`;
    }

    function shapeSvg(shape) {
      if (shape === "△") {
        return '<svg class="shape-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4 L20 19 H4 Z" fill="none" stroke="currentColor" stroke-width="2" /></svg>';
      }
      if (shape === "○") {
        return '<svg class="shape-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="2" /></svg>';
      }
      return '<svg class="shape-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="5" y="5" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" /></svg>';
    }

    function renderQuestion(questionId) {
      const question = QUESTIONS[questionId];
      if (!question) {
        renderResult(`题目${questionId}`);
        return;
      }

      if (questionId === "00") {
        openingBlock.classList.remove("hidden");
      } else {
        openingBlock.classList.add("hidden");
      }
      currentQuestion = questionId;
      setQuestionTitle(questionId, question.title);
      if (QUESTION_IMAGES[questionId]) {
        questionMedia.classList.remove("hidden");
        if (questionId === "10") {
          optionsRow.classList.add("side");
          questionMedia.classList.add("side");
        } else {
          optionsRow.classList.remove("side");
          questionMedia.classList.remove("side");
        }
        questionImage.src = QUESTION_IMAGES[questionId];
      } else {
        questionMedia.classList.add("hidden");
        questionMedia.classList.remove("side");
        optionsRow.classList.remove("side");
        questionImage.removeAttribute("src");
      }

      optionsWrap.innerHTML = question.options.map((option) => {
        if (questionId === "02" && (option.text === "△" || option.text === "○" || option.text === "□")) {
          return `<button class="option-item" data-choice="${option.key}"><span class="option-id">${option.key}</span> ${shapeSvg(option.text)}</button>`;
        }
        return `<button class="option-item" data-choice="${option.key}"><span class="option-id">${option.key}</span> ${option.text}</button>`;
      }).join("");
    }

    function renderResult(resultCode) {
      const result = RESULTS[resultCode];
      openingBlock.classList.add("hidden");
      questionText.textContent = result ? `测试结果：${result.name}` : `结果分支：${resultCode}`;
      questionMedia.classList.add("hidden");
      questionMedia.classList.remove("side");
      optionsRow.classList.remove("side");
      questionImage.removeAttribute("src");
      optionsWrap.innerHTML = `
        ${result ? `
          <div class="result-card">
            <p class="result-name">${result.name}</p>
            <p class="result-body">${result.body}</p>
            ${result.note ? `<p class="result-note">${result.note}</p>` : ""}
          </div>
        ` : ""}
        <button class="option-item" data-action="show-all-results">查看全部结果</button>
        <div class="all-results hidden" id="allResultsWrap"></div>
      `;
    }

    function showCover() {
      gamePage.classList.add("hidden");
      coverPage.classList.remove("hidden");
    }

    function showQuiz() {
      coverPage.classList.add("hidden");
      gamePage.classList.remove("hidden");
    }

    function goToQuestion(questionId, useReplace = false) {
      showQuiz();
      renderQuestion(questionId);
      const state = { view: "quiz-question", questionId };
      if (useReplace) {
        history.replaceState(state, "", "index.html");
      } else {
        history.pushState(state, "", "index.html");
      }
    }

    function goToResult(resultCode) {
      showQuiz();
      renderResult(resultCode);
      history.pushState({ view: "quiz-result", resultCode }, "", "index.html");
    }

    startBtn.addEventListener("click", () => {
      goToQuestion("00");
    });

    optionsWrap.addEventListener("click", (event) => {
      const optionButton = event.target.closest(".option-item");
      if (!optionButton) return;

      const action = optionButton.dataset.action;
      if (action === "show-all-results") {
        const allResultsWrap = document.getElementById("allResultsWrap");
        if (!allResultsWrap) return;
        optionButton.remove();
        allResultsWrap.classList.remove("hidden");
        allResultsWrap.innerHTML = `
          <p class="all-results-divider">————以下是全部角色————</p>
          ${Object.entries(RESULTS).map(([key, item]) => `
          <div class="result-card">
            <p class="result-name">${item.name}</p>
            <p class="result-body">${item.body}</p>
            ${item.note ? `<p class="result-note">${item.note}</p>` : ""}
          </div>
          `).join("")}
        `;
        return;
      }

      const selectedChoice = optionButton.dataset.choice;
      const current = QUESTIONS[currentQuestion];
      if (!current) return;
      const selectedOption = current.options.find((item) => item.key === selectedChoice);
      if (!selectedOption) return;

      if (selectedOption.next === "PAGE_GUESS_WARNING") {
        window.location.href = "guess-warning.html";
        return;
      }

      if (selectedOption.next.startsWith("OPT_")) {
        goToResult(selectedOption.next.replace("OPT_", ""));
        return;
      }

      goToQuestion(selectedOption.next);
    });

    if (window.location.hash === "#gender") {
      goToQuestion("00", true);
    } else {
      history.replaceState({ view: "cover" }, "", "index.html");
    }

    window.addEventListener("popstate", (event) => {
      const state = event.state;
      if (!state || state.view === "cover") {
        showCover();
        return;
      }

      if (state.view === "quiz-question" && state.questionId) {
        showQuiz();
        renderQuestion(state.questionId);
        return;
      }

      if (state.view === "quiz-result" && state.resultCode) {
        showQuiz();
        renderResult(state.resultCode);
        return;
      }

      showCover();
    });
  </script>
</body>
