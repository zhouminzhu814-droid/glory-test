<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>给我好好玩游戏啊喂！</title>
  <style>
    :root {
      --bg-1: #0f1020;
      --bg-2: #1a1c38;
      --card: rgba(255, 255, 255, 0.1);
      --border: rgba(255, 255, 255, 0.24);
      --text-main: #f7f8ff;
      --accent: #ffb703;
      --accent-hover: #ffc94a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--text-main);
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
      background: radial-gradient(circle at top right, #28326d 0%, transparent 40%),
        radial-gradient(circle at bottom left, #5f247a 0%, transparent 45%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
    }

    .card {
      width: min(760px, 100%);
      text-align: center;
      border: 1px solid var(--border);
      background: var(--card);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      padding: 40px 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    h1 {
      font-size: clamp(30px, 5vw, 50px);
      line-height: 1.25;
      margin-bottom: 24px;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      border-radius: 12px;
      padding: 14px 26px;
      font-size: 18px;
      font-weight: 700;
      color: #1f1f1f;
      background: var(--accent);
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .btn:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>给我好好玩游戏啊喂！</h1>
    <a class="btn" id="returnQuiz" href="index.html#gender">重新测试</a>
  </main>
  <script>
    (function () {
      var h = sessionStorage.getItem("quizReturnHome");
      if (h) {
        sessionStorage.removeItem("quizReturnHome");
        var a = document.getElementById("returnQuiz");
        if (a) a.setAttribute("href", h);
      }
    })();
  </script>
</body>
</html>
